<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSHOP - Utilisateurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="fermeture-auto.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <header class="bg-gray-900 text-white px-4 sm:px-6 py-4 flex justify-between items-center shadow-md sticky top-0 z-10">
        <h1 class="text-lg sm:text-2xl font-bold tracking-wide">👤 HSHOP <span id="titre-structure-header" class="font-normal opacity-80 text-sm sm:text-lg"></span> ── UTILISATEURS</h1>
        <div class="flex items-center gap-2 sm:gap-4">
            <a href="caisse.html" class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-2 rounded-lg font-bold transition">⬅ Caisse</a>
            <button onclick="deconnexion()" class="bg-red-500 hover:bg-red-600 text-white text-xs px-3 py-2 rounded-lg font-bold transition">🚪</button>
        </div>
    </header>

    <main id="contenu" class="p-4 sm:p-6 max-w-3xl mx-auto">
        <p class="text-gray-400 italic text-center py-10">Chargement...</p>
    </main>

    <!-- ===== MODAL NOUVEL UTILISATEUR ===== -->
    <div id="modal-nouveau" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Nouvel utilisateur</h2>
            <form onsubmit="creerUtilisateur(event)" class="space-y-3">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Identifiant *</label>
                    <input id="nu-identifiant" required class="w-full border rounded-lg p-2 mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Mot de passe *</label>
                    <input id="nu-mdp" type="text" required minlength="4" class="w-full border rounded-lg p-2 mt-1">
                    <p class="text-[11px] text-gray-400 mt-1">Visible en clair pour pouvoir le communiquer — minimum 4 caractères.</p>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Rôle</label>
                    <select id="nu-role" class="w-full border rounded-lg p-2 mt-1 bg-white">
                        <option value="vendeur">Vendeur</option>
                        <option value="magasinier">Magasinier</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="fermerModalNouveau()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-lg">Annuler</button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg">Créer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== MODAL REINITIALISER MOT DE PASSE ===== -->
    <div id="modal-reset" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-1">Réinitialiser le mot de passe</h2>
            <p id="reset-nom-utilisateur" class="text-xs text-gray-400 mb-4"></p>
            <form onsubmit="confirmerReset(event)" class="space-y-3">
                <input type="hidden" id="reset-user-id">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Nouveau mot de passe *</label>
                    <input id="reset-mdp" type="text" required minlength="4" class="w-full border rounded-lg p-2 mt-1">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="fermerModalReset()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-lg">Annuler</button>
                    <button type="submit" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 rounded-lg">Réinitialiser</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "";
        let token = localStorage.getItem("hshop_token");
        let monIdentifiant = localStorage.getItem("hshop_user");
        let cacheUtilisateurs = [];

        window.onload = function() {
            token = localStorage.getItem("hshop_token");
            if (!token) { window.location.href = "login.html"; return; }
            chargerNomStructureHeader();
            chargerUtilisateurs();
        };

        function deconnexion() { localStorage.clear(); window.location.href = "login.html"; }
        function gererNonAutorise() { localStorage.clear(); window.location.href = "login.html"; }
        function authHeaders(json) { return json ? { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" } : { "Authorization": `Bearer ${token}` }; }

        async function api(path, options = {}) {
            const response = await fetch(`${API_URL}${path}`, options);
            if (response.status === 401) { gererNonAutorise(); throw new Error("401"); }
            if (response.status === 403) {
                document.getElementById("contenu").innerHTML = `<div class="bg-white rounded-xl shadow p-8 text-center">
                    <p class="text-red-500 font-bold text-lg mb-2">⛔ Accès réservé aux comptes administrateur</p>
                    <a href="caisse.html" class="text-blue-600 hover:underline">Retour à la caisse</a>
                </div>`;
                throw new Error("403");
            }
            if (!response.ok) {
                let detail = "Erreur serveur.";
                try { detail = (await response.json()).detail || detail; } catch (e) {}
                throw new Error(detail);
            }
            return response.status === 204 ? null : response.json();
        }

        const LABEL_ROLE = { admin: "Admin", vendeur: "Vendeur", magasinier: "Magasinier" };

        async function chargerUtilisateurs() {
            const contenu = document.getElementById("contenu");
            try {
                cacheUtilisateurs = await api("/utilisateurs", { headers: authHeaders() });
                contenu.innerHTML = `
                    <div class="flex justify-end mb-4">
                        <button onclick="ouvrirModalNouveau()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-lg">+ Nouvel utilisateur</button>
                    </div>
                    <div class="bg-white rounded-xl shadow overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead><tr class="text-gray-400 uppercase text-xs border-b">
                                <th class="p-3">Identifiant</th><th class="p-3">Rôle</th><th class="p-3">Statut</th><th class="p-3 text-right">Actions</th>
                            </tr></thead>
                            <tbody id="table-utilisateurs" class="divide-y"></tbody>
                        </table>
                    </div>`;
                rendreTable();
            } catch (e) { if (e.message !== "401" && e.message !== "403") contenu.innerHTML = `<p class="text-red-500 text-center py-10">${e.message}</p>`; }
        }

        function rendreTable() {
            const body = document.getElementById("table-utilisateurs");
            body.innerHTML = cacheUtilisateurs.map(u => {
                const cestMoi = u.identifiant === monIdentifiant;
                return `
                <tr class="${u.actif ? '' : 'opacity-50'}">
                    <td class="p-3 font-bold">${u.identifiant}${cestMoi ? ' <span class="text-xs text-blue-500 font-normal">(toi)</span>' : ''}</td>
                    <td class="p-3">
                        <select onchange="changerRole(${u.id}, this.value, ${u.actif})" ${cestMoi ? 'disabled' : ''} class="border rounded p-1 text-sm bg-white disabled:bg-gray-50 disabled:text-gray-400">
                            <option value="vendeur" ${u.role==='vendeur'?'selected':''}>Vendeur</option>
                            <option value="magasinier" ${u.role==='magasinier'?'selected':''}>Magasinier</option>
                            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                        </select>
                    </td>
                    <td class="p-3">${u.actif ? '<span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">Actif</span>' : '<span class="bg-gray-200 text-gray-500 text-xs font-bold px-2 py-1 rounded">Désactivé</span>'}</td>
                    <td class="p-3 text-right whitespace-nowrap">
                        <button onclick="ouvrirModalReset(${u.id}, '${u.identifiant}')" class="text-blue-600 hover:underline text-xs font-bold mr-3">Mot de passe</button>
                        <button onclick="toggleActif(${u.id}, ${u.actif}, '${u.role}')" ${cestMoi ? 'disabled' : ''} class="text-xs font-bold hover:underline disabled:text-gray-300 disabled:no-underline ${u.actif ? 'text-red-500' : 'text-green-600'}">${u.actif ? 'Désactiver' : 'Activer'}</button>
                    </td>
                </tr>`;
            }).join("");
        }

        async function changerRole(id, nouveauRole, actifActuel) {
            try {
                await api(`/utilisateurs/${id}`, { method: "PUT", headers: authHeaders(true), body: JSON.stringify({ role: nouveauRole, actif: !!actifActuel }) });
                chargerUtilisateurs();
            } catch (e) {
                if (e.message !== "401" && e.message !== "403") { alert("⚠️ " + e.message); chargerUtilisateurs(); }
            }
        }

        async function toggleActif(id, actifActuel, role) {
            const nouveauStatut = !actifActuel;
            if (!confirm(nouveauStatut ? "Réactiver ce compte ?" : "Désactiver ce compte ? La personne ne pourra plus se connecter.")) return;
            try {
                await api(`/utilisateurs/${id}`, { method: "PUT", headers: authHeaders(true), body: JSON.stringify({ role: role, actif: nouveauStatut }) });
                chargerUtilisateurs();
            } catch (e) { if (e.message !== "401" && e.message !== "403") alert("⚠️ " + e.message); }
        }

        function ouvrirModalNouveau() {
            document.getElementById("nu-identifiant").value = "";
            document.getElementById("nu-mdp").value = "";
            document.getElementById("nu-role").value = "vendeur";
            document.getElementById("modal-nouveau").classList.remove("hidden");
        }
        function fermerModalNouveau() { document.getElementById("modal-nouveau").classList.add("hidden"); }

        async function creerUtilisateur(event) {
            event.preventDefault();
            const payload = {
                identifiant: document.getElementById("nu-identifiant").value.trim(),
                mot_de_passe: document.getElementById("nu-mdp").value,
                role: document.getElementById("nu-role").value,
            };
            try {
                await api("/utilisateurs", { method: "POST", headers: authHeaders(true), body: JSON.stringify(payload) });
                fermerModalNouveau();
                chargerUtilisateurs();
            } catch (e) { if (e.message !== "401" && e.message !== "403") alert("⚠️ " + e.message); }
        }

        function ouvrirModalReset(id, identifiant) {
            document.getElementById("reset-user-id").value = id;
            document.getElementById("reset-nom-utilisateur").innerText = "Pour : " + identifiant;
            document.getElementById("reset-mdp").value = "";
            document.getElementById("modal-reset").classList.remove("hidden");
        }
        function fermerModalReset() { document.getElementById("modal-reset").classList.add("hidden"); }

        async function confirmerReset(event) {
            event.preventDefault();
            const id = document.getElementById("reset-user-id").value;
            const nouveau = document.getElementById("reset-mdp").value;
            try {
                await api(`/utilisateurs/${id}/reset-password`, { method: "POST", headers: authHeaders(true), body: JSON.stringify({ nouveau_mot_de_passe: nouveau }) });
                fermerModalReset();
                alert("✅ Mot de passe réinitialisé.");
            } catch (e) { if (e.message !== "401" && e.message !== "403") alert("⚠️ " + e.message); }
        }

        async function chargerNomStructureHeader() {
            try {
                const response = await fetch(`${API_URL}/parametres`, { headers: { "Authorization": `Bearer ${token}` } });
                if (!response.ok) return;
                const p = await response.json();
                if (p.nom_structure) document.getElementById("titre-structure-header").innerText = "— " + p.nom_structure;
            } catch (e) { /* pas bloquant */ }
        }
    </script>
</body>
</html>
