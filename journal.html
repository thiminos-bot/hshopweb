<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSHOP - Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="fermeture-auto.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <header class="bg-gray-900 text-white px-4 sm:px-6 py-4 flex justify-between items-center shadow-md sticky top-0 z-10">
        <h1 class="text-lg sm:text-2xl font-bold tracking-wide">📜 HSHOP <span id="titre-structure-header" class="font-normal opacity-80 text-sm sm:text-lg"></span> ── JOURNAL D'AUDIT</h1>
        <div class="flex items-center gap-2 sm:gap-4">
            <button onclick="chargerJournal()" class="bg-gray-700 hover:bg-gray-600 text-white text-xs px-3 py-2 rounded-lg font-bold transition">🔄</button>
            <a href="caisse.html" class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-2 rounded-lg font-bold transition">⬅ Caisse</a>
            <button onclick="deconnexion()" class="bg-red-500 hover:bg-red-600 text-white text-xs px-3 py-2 rounded-lg font-bold transition">🚪</button>
        </div>
    </header>

    <main id="contenu" class="p-4 sm:p-6 max-w-4xl mx-auto">
        <p class="text-gray-400 italic text-center py-10">Chargement...</p>
    </main>

    <script>
        const API_URL = "";
        let token = localStorage.getItem("hshop_token");

        window.onload = function() {
            token = localStorage.getItem("hshop_token");
            if (!token) { window.location.href = "login.html"; return; }
            chargerNomStructureHeader();
            chargerJournal();
        };

        function deconnexion() { localStorage.clear(); window.location.href = "login.html"; }
        function gererNonAutorise() { localStorage.clear(); window.location.href = "login.html"; }

        const ICONES_ACTION = {
            "CONNEXION": "🔑", "VENTE": "🛒", "CLOTURE_CAISSE": "🔒",
            "PRODUIT_ACTIF": "✅", "PRODUIT_INACTIF": "⛔", "PARAMETRES_MODIFIES": "⚙️",
            "REGLEMENT_CLIENT": "💳", "DEPENSE_SUPPRIMEE": "🗑️",
        };

        async function chargerJournal() {
            const contenu = document.getElementById("contenu");
            contenu.innerHTML = `<p class="text-gray-400 italic text-center py-10">Chargement...</p>`;
            try {
                const response = await fetch(`${API_URL}/journal?limite=200`, { headers: { "Authorization": `Bearer ${token}` } });
                if (response.status === 401) { gererNonAutorise(); return; }
                if (response.status === 403) {
                    contenu.innerHTML = `<div class="bg-white rounded-xl shadow p-8 text-center">
                        <p class="text-red-500 font-bold text-lg mb-2">⛔ Accès réservé aux comptes administrateur</p>
                        <a href="caisse.html" class="text-blue-600 hover:underline">Retour à la caisse</a>
                    </div>`;
                    return;
                }
                if (!response.ok) throw new Error();
                const liste = await response.json();
                contenu.innerHTML = `
                    <div class="bg-white rounded-xl shadow divide-y" id="liste-journal"></div>
                    <p class="text-xs text-gray-400 mt-3 text-center">200 actions les plus récentes affichées.</p>`;
                const zone = document.getElementById("liste-journal");
                zone.innerHTML = liste.length === 0 ? `<p class="p-8 text-center text-gray-400 italic">Aucune action enregistrée.</p>` :
                    liste.map(j => `
                        <div class="p-3 flex items-start gap-3 text-sm">
                            <span class="text-lg">${ICONES_ACTION[j.action] || "•"}</span>
                            <div class="flex-1">
                                <div class="flex justify-between">
                                    <span class="font-bold text-gray-700">${j.action.replace(/_/g, ' ')}</span>
                                    <span class="text-xs text-gray-400">${j.date_action}</span>
                                </div>
                                <div class="text-gray-500">${j.detail || ''}</div>
                            </div>
                            <span class="bg-gray-100 text-xs px-2 py-1 rounded font-bold text-gray-600 whitespace-nowrap">${j.utilisateur || 'système'}</span>
                        </div>`).join("");
            } catch (e) { contenu.innerHTML = `<p class="text-red-500 text-center py-10">Erreur de chargement.</p>`; }
        }

        async function chargerNomStructureHeader() {
            try {
                const response = await fetch(`${API_URL}/parametres`, { headers: { "Authorization": `Bearer ${token}` } });
                if (!response.ok) return;
                const p = await response.json();
                if (p.nom_structure) document.getElementById("titre-structure-header").innerText = "— " + p.nom_structure;
            } catch (e) { /* pas bloquant */ }
        }
    </script>
</body>
</html>
